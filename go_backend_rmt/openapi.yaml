  /inventory/stock:
    get:
      summary: Get stock for a location
      parameters:
      - name: location_id
        in: query
        schema:
          type: integer
      - name: product_id
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: Stock list
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/APIResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/StockWithProduct'
  /inventory/variants:
    get:
      summary: Get stock variations for a product at a location
      parameters:
      - name: location_id
        in: query
        required: true
        schema:
          type: integer
      - name: product_id
        in: query
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Variant stock list
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/APIResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/StockVariant'
  /inventory/batches:
    get:
      summary: Get available stock batches for a product variation
      parameters:
      - name: location_id
        in: query
        required: true
        schema:
          type: integer
      - name: product_id
        in: query
        required: true
        schema:
          type: integer
      - name: barcode_id
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: Available stock batches
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/APIResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/StockLot'
  /inventory/serials:
    get:
      summary: Get available serial numbers for a product variation
      parameters:
      - name: location_id
        in: query
        required: true
        schema:
          type: integer
      - name: product_id
        in: query
        required: true
        schema:
          type: integer
      - name: barcode_id
        in: query
