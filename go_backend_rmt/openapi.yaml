openapi: 3.0.0
info:
  title: EBS Lite API
  version: 1.0.0
servers:
- url: /api/v1
paths:
  /health:
    servers:
    - url: /
    get:
      summary: GET /health
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /ready:
    servers:
    - url: /
    get:
      summary: GET /ready
      responses:
        '200':
          description: Ready (DB + Redis ok)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /auth/login:
    post:
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
  /auth/forgot-password:
    post:
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Instructions sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /auth/reset-password:
    post:
      summary: Reset user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /auth/refresh-token:
    post:
      summary: Refresh authentication token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
  /languages:
    get:
      summary: GET /api/v1/languages
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /auth/me:
    get:
      summary: Retrieve current user
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
  /auth/logout:
    post:
      summary: Logout current user
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /auth/verify:
    post:
      summary: Verify credentials (manager override)
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCredentialsRequest'
  /device-sessions:
    get:
      summary: GET /api/v1/device-sessions
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /device-sessions/{session_id}:
    delete:
      summary: DELETE /api/v1/device-sessions/{session_id}
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
  /dashboard/metrics:
    get:
      summary: GET /api/v1/dashboard/metrics
      parameters:
        - in: query
          name: location_id
          required: false
          schema:
            type: integer
          description: Optional location scope. If omitted, aggregates across all company locations.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /dashboard/overview:
    get:
      summary: GET /api/v1/dashboard/overview
      parameters:
        - in: query
          name: location_id
          required: false
          schema:
            type: integer
          description: Optional location scope. If omitted, aggregates across all company locations.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/APIResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/DashboardOverview'
  /dashboard/quick-actions:
    get:
      summary: GET /api/v1/dashboard/quick-actions
      parameters:
        - in: query
          name: location_id
          required: false
          schema:
            type: integer
          description: Optional location scope. If omitted, aggregates across all company locations.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /users:
    get:
      summary: List users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/APIResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/UserResponse'
    post:
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /users/{id}:
    put:
      summary: Update a user
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      summary: Delete a user
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Deletion successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /companies:
    get:
      summary: GET /api/v1/companies
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Company'
                  error:
                    type: string
                    nullable: true
                  meta:
                    type: object
                    nullable: true
    post:
      summary: POST /api/v1/companies
      responses:
        '201':
          description: Company created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Company'
                  error:
                    type: string
                    nullable: true
                  meta:
                    type: object
                    nullable: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompanyRequest'
  /companies/{id}:
    put:
      summary: PUT /api/v1/companies/{id}
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Company'
                  error:
                    type: string
                    nullable: true
                  meta:
                    type: object
                    nullable: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompanyRequest'
    delete:
      summary: DELETE /api/v1/companies/{id}
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Company'
                    nullable: true
                  error:
                    type: string
                    nullable: true
                  meta:
                    type: object
                    nullable: true
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /companies/{id}/logo:
    post:
      summary: POST /api/v1/companies/{id}/logo
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /locations:
    get:
      summary: GET /api/v1/locations
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
    post:
      summary: POST /api/v1/locations
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
  /locations/{id}:
    put:
      summary: PUT /api/v1/locations/{id}
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationRequest'
    delete:
      summary: DELETE /api/v1/locations/{id}
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
  /roles:
    get:
      summary: GET /api/v1/roles
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
    post:
      summary: POST /api/v1/roles
      responses:
        '200':
