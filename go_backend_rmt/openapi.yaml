components:
  schemas:
    APIResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        error:
          type: string
        meta:
          type: object
          additionalProperties: true
    CompanySettings:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        inventory_costing_method:
          type: string
    InventorySettings:
      type: object
      properties:
        inventory_costing_method:
          type: string
        negative_stock_policy:
          type: string
        has_negative_stock_approval_password:
          type: boolean
    UpdateInventorySettingsRequest:
      type: object
      required:
        - negative_stock_policy
      properties:
        negative_stock_policy:
          type: string
        negative_stock_approval_password:
          type: string
          nullable: true
    ApproveStockTransferRequest:
      type: object
      properties:
        override_password:
          type: string
          nullable: true
    DashboardMetrics:
      type: object
      properties:
        credit_outstanding:
          type: number
          format: float
        inventory_value:
          type: number
          format: float
        today_sales:
          type: number
          format: float
        today_purchases:
          type: number
          format: float
        cash_in:
          type: number
          format: float
        cash_out:
          type: number
          format: float
        daily_cash_summary:
          type: number
          format: float
        total_sales:
          type: number
          format: float
        total_purchases:
          type: number
          format: float
        cash_in_total:
          type: number
          format: float
        cash_out_total:
          type: number
          format: float
    QuickActionCounts:
      type: object
      properties:
        sales_today:
          type: integer
        purchases_today:
          type: integer
        collections_today:
          type: integer
        expenses_today:
          type: integer
        payments_today:
          type: integer
        receipts_today:
          type: integer
        journals_today:
          type: integer
        low_stock_items:
          type: integer
    DashboardCashFlowTransaction:
      type: object
      properties:
        id:
          type: string
        transaction_type:
          type: string
        entity_name:
          type: string
        reference_number:
          type: string
          nullable: true
        amount:
          type: number
