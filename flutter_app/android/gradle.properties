org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512M -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError
org.gradle.workers.max=1
org.gradle.parallel=false
# Workaround for Windows file-lock issues during Gradle builds (assets/resources merge).
org.gradle.vfs.watch=false
kotlin.daemon.jvmargs=-Xmx1G
android.useAndroidX=true
android.enableJetifier=true
